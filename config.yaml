llm:
  provider: openrouter
  # Model is swappable — OpenRouter supports 100+ models.
  # Examples:
  #   openai/gpt-4o-mini              (fast, cheap)
  #   anthropic/claude-3.5-sonnet     (best for code gen — DEFAULT)
  #   anthropic/claude-3-haiku        (fast + cheap Anthropic)
  #   google/gemini-flash-1.5         (very fast)
  model: openai/gpt-oss-120b:free
  temperature: 0.1
  max_tokens: 16384
  base_url: https://openrouter.ai/api/v1

database:
  url: "sqlite:///./test_data.db"

server:
  host: "0.0.0.0"
  port: 8000

logging:
  level: INFO
  format: console
